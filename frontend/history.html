<!DOCTYPE html>

      "primary-fixed":"#ffe16e","on-primary-container":"#625100","surface-container-highest":"#2e3543",
      "on-secondary-container":"#aab5d2","primary":"#ffe16f","secondary-container":"#3c475f",
      "error-container":"#93000a","surface-container-lowest":"#070e1b","on-background":"#dce2f5",
      "surface":"#0d1321","surface-container-low":"#151c29","on-tertiary":"#00363a",
      "tertiary-container":"#00dbe9","on-primary":"#3a3000","surface-container":"#19202d",
      "surface-container-high":"#232a38","on-error-container":"#ffdad6","surface-variant":"#2e3543",
      "on-secondary":"#263047","on-surface":"#dce2f5","surface-dim":"#0d1321","outline":"#999078",
      "primary-fixed-dim":"#e9c400","on-primary-fixed":"#221b00","background":"#0d1321",
      "on-surface-variant":"#d0c6ac","primary-container":"#e9c400","tertiary":"#7bf4ff",
      "surface-bright":"#333948","surface-tint":"#e9c400","on-error":"#690005","error":"#ffb4ab",
      "outline-variant":"#4d4632"
    },
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    spacing:{"section-gap":"32px","margin":"24px","gutter":"16px","container-padding":"20px","unit":"4px"},
    fontFamily:{"headline-md":["Sora"],"headline-lg":["Sora"],"body-lg":["Inter"],"headline-sm":["Sora"],"data-mono":["Inter"],"body-md":["Inter"],"label-sm":["Inter"],"display-lg":["Sora"]},
    fontSize:{
      "headline-md":["24px",{"lineHeight":"32px","fontWeight":"600"}],
      "headline-lg":["32px",{"lineHeight":"40px","fontWeight":"600"}],
      "body-lg":["18px",{"lineHeight":"28px","fontWeight":"400"}],
      "headline-sm":["20px",{"lineHeight":"28px","fontWeight":"600"}],
      "data-mono":["14px",{"lineHeight":"20px","letterSpacing":"0.05em","fontWeight":"600"}],
      "body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],
      "label-sm":["12px",{"lineHeight":"16px","fontWeight":"500"}],
      "display-lg":["48px",{"lineHeight":"56px","letterSpacing":"-0.02em","fontWeight":"700"}]

</script>
<style>
.glass-panel{background:rgba(25,32,45,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d1321}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body class="bg-background text-on-surface flex h-screen overflow-hidden font-sans">

<!-- Sidebar -->
<nav class="bg-surface-container fixed left-0 top-0 h-full w-64 border-r border-white/5 flex flex-col pt-20 pb-8 px-4 z-40 hidden md:flex">
<div class="mb-10 px-2 flex flex-col gap-1">
  <h2 class="font-headline-sm text-headline-sm text-primary tracking-tighter">IPL COMMAND</h2>
  <p id="navLiveLabel" class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Loading...</p>
</div>
<ul class="flex flex-col gap-2 flex-1">
  <li><a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant/70 hover:text-on-surface hover:bg-white/5 transition-all duration-200" href="index.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0;">psychology_alt</span><span class="font-label-sm text-label-sm uppercase tracking-widest">AI War Room</span></a></li>
  <li><a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant/70 hover:text-on-surface hover:bg-white/5 transition-all duration-200" href="insights.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0;">analytics</span><span class="font-label-sm text-label-sm uppercase tracking-widest">Insights</span></a></li>
  <li><a class="flex items-center gap-3 px-4 py-3 rounded-lg bg-secondary-container/50 text-primary border-r-2 border-primary translate-x-1" href="history.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">history_edu</span><span class="font-label-sm text-label-sm uppercase tracking-widest">History Terminal</span></a></li>
</ul>
<a href="index.html" class="mb-6 w-full py-3 bg-primary text-on-primary font-label-sm text-label-sm uppercase tracking-widest rounded-DEFAULT hover:bg-primary/90 transition-colors text-center block">INITIATE DEBATE</a>
<ul class="flex flex-col gap-2">
  <li><a class="flex items-center gap-3 px-4 py-2 rounded-lg text-on-surface-variant/70 hover:text-on-surface hover:bg-white/5 transition-all" href="#"><span class="material-symbols-outlined">settings</span><span class="font-label-sm text-label-sm uppercase tracking-widest">Settings</span></a></li>
  <li><a class="flex items-center gap-3 px-4 py-2 rounded-lg text-on-surface-variant/70 hover:text-on-surface hover:bg-white/5 transition-all" href="#"><span class="material-symbols-outlined">help</span><span class="font-label-sm text-label-sm uppercase tracking-widest">Support</span></a></li>
</ul>
</nav>

<main class="flex-1 flex flex-col ml-64 min-w-0">
<header class="bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_0_15px_rgba(233,196,0,0.1)] sticky top-0 z-50 flex justify-between items-center w-full px-margin h-16">
  <div class="flex items-center gap-4">
    <h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tighter">CAPTAIN COOL</h1>
  </div>
  <div class="flex items-center gap-4">
    <div class="relative hidden lg:block">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
      <input class="bg-surface-container border border-outline-variant rounded-full py-1.5 pl-10 pr-4 text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-64 transition-all" placeholder="Search matches..." type="text" id="searchInput" oninput="filterMatches()"/>
    </div>
    <button class="p-2 text-on-surface-variant hover:bg-white/5 rounded-full transition-colors"><span class="material-symbols-outlined">notifications</span></button>
    <button class="p-2 text-on-surface-variant hover:bg-white/5 rounded-full transition-colors"><span class="material-symbols-outlined">account_circle</span></button>
  </div>
</header>

<div class="flex-1 overflow-y-auto p-margin flex flex-col gap-section-gap">
  <div class="flex justify-between items-end">
    <div>
      <p class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-1 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>IPL 2025 Archive</p>
      <h2 class="font-headline-lg text-headline-lg text-on-surface">Match History Terminal</h2>
    </div>
    <div id="matchCountBadge" class="px-3 py-1.5 bg-surface-container rounded border border-white/5 font-data-mono text-data-mono text-on-surface">
      Matches: <span id="matchCount" class="text-primary">--</span>
    </div>
  </div>

  <!-- Match List -->
  <div class="space-y-4" id="matchList">
    <div class="glass-panel rounded-xl p-6 animate-pulse h-32"></div>
    <div class="glass-panel rounded-xl p-6 animate-pulse h-32"></div>
    <div class="glass-panel rounded-xl p-6 animate-pulse h-32"></div>
  </div>
</div>
</main>

<script>
const API = "";
let allMatches = [];

async function loadHistory() {
  try {
    const lRes = await fetch(API + "/api/live");
    const live = await lRes.json();
    document.getElementById("navLiveLabel").textContent = live.error ? "No Live IPL Match" : `Live: ${live.team_batting} vs ${live.team_bowling}`;

    const res = await fetch(API + "/api/matches");
    allMatches = await res.json();
    if (allMatches.length && allMatches[0].error) {
      document.getElementById("matchList").innerHTML = `<div class="text-center text-error py-12"><span class="material-symbols-outlined text-4xl mb-2">error</span><p>Failed to load matches.</p></div>`;
      return;
    }
    document.getElementById("matchCount").textContent = allMatches.length;
    renderMatches(allMatches);
  } catch(e) {
    console.error(e);
    document.getElementById("navLiveLabel").textContent = "API Offline";
    document.getElementById("matchList").innerHTML = `<div class="text-center text-error py-12"><span class="material-symbols-outlined text-4xl mb-2">wifi_off</span><p>Cannot reach backend API.</p></div>`;
  }
}

function renderMatches(matches) {
  if (!matches.length) {
    document.getElementById("matchList").innerHTML = `<div class="text-center text-on-surface-variant py-12">No matches found.</div>`;
    return;
  }
  document.getElementById("matchList").innerHTML = matches.map((m, i) => {
    const isLive = m.state === "In Progress";
    const borderColor = isLive ? "border-tertiary/30" : "border-white/5";
    const stateColor = isLive ? "text-tertiary" : m.state === "Complete" ? "text-primary" : "text-on-surface-variant";
    const stateIcon = isLive ? "sensors" : m.state === "Complete" ? "check_circle" : "schedule";
    const stateBg = isLive ? "bg-tertiary/10" : m.state === "Complete" ? "bg-primary/10" : "bg-surface-container-highest";
    return `
    <div class="glass-panel rounded-xl p-container-padding hover:border-primary/30 transition-all cursor-pointer group ${borderColor}" onclick="viewMatch(${m.match_id})">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex items-center gap-6 flex-1">
          <div class="flex flex-col items-center">
            <span class="font-data-mono text-data-mono text-on-surface-variant">${m.match_desc || 'Match ' + (i+1)}</span>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
              <span class="font-headline-sm text-headline-sm text-on-surface group-hover:text-primary transition-colors">${m.team1_sname || m.team1_name} vs ${m.team2_sname || m.team2_name}</span>
              <span class="${stateBg} ${stateColor} font-data-mono text-data-mono px-2 py-0.5 rounded flex items-center gap-1">
                <span class="material-symbols-outlined text-[14px]">${stateIcon}</span>${m.state}
              </span>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant/80 line-clamp-1">${m.status}</p>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="text-right">
            <div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mb-1">Venue</div>
            <div class="font-data-mono text-data-mono text-on-surface">${m.city || m.venue || '--'}</div>
          </div>
          <span class="material-symbols-outlined text-on-surface-variant/30 group-hover:text-primary transition-colors">arrow_forward</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function filterMatches() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allMatches.filter(m => {
    const text = `${m.team1_name} ${m.team2_name} ${m.team1_sname} ${m.team2_sname} ${m.status} ${m.city} ${m.venue} ${m.match_desc}`.toLowerCase();
    return text.includes(q);
  });
  renderMatches(filtered);
}

function viewMatch(matchId) {
  window.location.href = `insights.html?match=${matchId}`;
}

loadHistory();
</script>
</body></html>
